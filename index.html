<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHAS 오늘의 급식</title>
    <link rel="manifest" href="manifest.json?v=8">
    <link rel="icon" type="image/png" href="icon1.png">
    <link rel="apple-touch-icon" href="icon1.png">
    <meta name="theme-color" content="#007AFF" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1a1c1e" media="(prefers-color-scheme: dark)">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
    <style>
        :root {
            --main-color: #007AFF;
            /* Light Mode (Default) */
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #1a1c1e;
            --sub-text: #666;
            --border-color: #e1e4e8;
            --btn-inactive: #e1e4e8;
            --btn-inactive-text: #666;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1c1e;
                --card-bg: #2a2d31;
                --text-color: #ffffff;
                --sub-text: #aaa;
                --border-color: #007AFF;
                --btn-inactive: #2a2d31;
                --btn-inactive-text: #aaa;
                --shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            }
        }

        /* Manual Theme Overrides */
        body.light-theme {
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #1a1c1e;
            --sub-text: #666;
            --btn-inactive: #e1e4e8;
            --btn-inactive-text: #666;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        body.dark-theme {
            --bg-color: #1a1c1e;
            --card-bg: #2a2d31;
            --text-color: #ffffff;
            --sub-text: #aaa;
            --btn-inactive: #2a2d31;
            --btn-inactive-text: #aaa;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid var(--main-color);
            margin-bottom: 20px;
        }

        .logo {
            display: block;
            margin: 0 auto 10px;
            width: 100px;
            height: auto;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 1px;
            color: var(--main-color);
        }

        .header p {
            margin: 5px 0 0;
            color: var(--sub-text);
            font-size: 0.9rem;
        }

        #weather-info {
            color: var(--sub-text);
            font-size: 0.85rem;
        }

        .meal-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            transition: 0.3s;
            border-left: 5px solid transparent;
        }

        .meal-card:hover {
            transform: translateY(-5px);
            border-left: 5px solid var(--main-color);
        }

        .meal-type {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            color: var(--main-color);
        }

        .meal-list {
            line-height: 1.8;
            color: var(--text-color);
            font-size: 1rem;
            word-break: keep-all;
            white-space: pre-line;
            opacity: 0.9;
        }

        .calorie {
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--sub-text);
            text-align: right;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-group button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--btn-inactive);
            color: var(--btn-inactive-text);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-group button.active {
            background: var(--main-color);
            color: white;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3);
        }

        .btn-group button:hover:not(.active) {
            background: #eef2f7;
            color: var(--main-color);
        }

        @media (prefers-color-scheme: dark) {
            .btn-group button:hover:not(.active) {
                background: #3a3d41;
                color: white;
            }
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-bottom: 20px;
            color: var(--sub-text);
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <img src="logo.svg" alt="GHAS Logo" class="logo">
            <h1 id="title-text">경기자동차과학고 급식</h1>
            <p id="today-date">0000.00.00</p>
            <p id="weather-info">날씨 정보를 불러오는 중...</p>
        </div>

        <div class="btn-group">
            <button id="btn-today" class="active" onclick="showMeals('today')">오늘</button>
            <button id="btn-tomorrow" onclick="showMeals('tomorrow')">내일</button>
            <button id="btn-week" onclick="showMeals('week')">이번 주</button>
            <button id="btn-noti" onclick="requestNoti()">🔔</button>
            <button id="btn-theme" onclick="toggleTheme()">Theme</button>
        </div>

        <div class="meal-card">
            <div id="lunch-title" class="meal-type">오늘 중식 (Lunch)</div>
            <div id="lunch-menu" class="meal-list">데이터를 불러오는 중...</div>
            <div id="lunch-cal" class="calorie"></div>
        </div>

        <div class="meal-card">
            <div id="dinner-title" class="meal-type">오늘 석식 (Dinner)</div>
            <div id="dinner-menu" class="meal-list">데이터를 불러오는 중...</div>
            <div id="dinner-cal" class="calorie"></div>

        </div>

        <footer class="footer">
            <a href="https://github.com/luka0116kjh" style="text-decoration: none; color: #c9d1d9; ">
                lukaproduce</a>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="script.js?v=4"></script>
</body>

</html>
